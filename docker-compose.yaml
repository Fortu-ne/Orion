

services:

  # PostgreSQL database
  postgres:
    image: postgres:16         
    container_name: orion-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: orion
    ports:
      - "5432:5432"             
    volumes:
      - pgdata:/var/lib/postgresql/data   

  # Redis cache
  redis:
    image: redis:7              
    container_name: orion-redis
    ports:
      - "6379:6379"             
    volumes:
      - redisdata:/data        


volumes:
  pgdata:
  redisdata: